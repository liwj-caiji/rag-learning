# RAGAS evaluation dataset — Chinese recipe RAG system
# ~30 queries across all 4 intent types

# =============================================================================
# howto — 做法查询 (10条，含 ground_truth)
# =============================================================================

- query: "麻婆豆腐怎么做"
  intent: howto
  target_dish: "麻婆豆腐"
  ground_truth: |
    麻婆豆腐的主要原料：豆腐、牛肉末、豆瓣酱、花椒、辣椒面、蒜苗、姜、蒜。
    步骤：1.豆腐切小块，加盐焯水；2.牛肉末炒香，加入豆瓣酱炒出红油；3.加姜蒜末、辣椒面炒香；4.加水或高汤，放入豆腐煮几分钟；5.勾芡收汁，撒花椒面和蒜苗段出锅。

- query: "红烧肉的做法"
  intent: howto
  target_dish: "红烧肉"
  ground_truth: |
    红烧肉的主要原料：五花肉、冰糖、生抽、老抽、料酒、姜、葱、八角、桂皮。
    步骤：1.五花肉焯水后切块；2.炒糖色：小火将冰糖炒至焦糖色；3.下肉块翻炒上色；4.加料酒、生抽、老抽、姜葱、八角桂皮；5.加热水没过肉，大火烧开转小火炖40-60分钟；6.大火收汁即可。

- query: "番茄炒蛋怎么做"
  intent: howto
  target_dish: "番茄炒蛋"
  ground_truth: |
    番茄炒蛋的主要原料：鸡蛋、番茄、盐、糖、葱花、油。
    步骤：1.鸡蛋打散加少许盐搅拌均匀；2.番茄切块；3.热锅热油炒鸡蛋至凝固盛出；4.炒番茄出汁，加少许糖；5.倒回鸡蛋翻炒均匀，加盐调味撒葱花出锅。

- query: "清蒸鲈鱼怎么做好吃"
  intent: howto
  target_dish: "清蒸鲈鱼"
  ground_truth: |
    清蒸鲈鱼的主要原料：鲈鱼、姜、葱、蒸鱼豉油、料酒、盐。
    步骤：1.鲈鱼清理干净，鱼身划刀，抹料酒和盐腌制；2.姜片和葱段铺盘底，鱼放在上面；3.水开后上锅蒸8-10分钟；4.倒掉盘中汤汁，铺葱姜丝在鱼身上；5.淋蒸鱼豉油，浇热油激发香味。

- query: "宫保鸡丁的做法"
  intent: howto
  target_dish: "宫保鸡丁"
  ground_truth: |
    宫保鸡丁的主要原料：鸡胸肉、花生米、干辣椒、花椒、葱、姜、蒜、酱油、醋、糖、淀粉。
    步骤：1.鸡胸肉切丁，加料酒、生抽、淀粉腌制；2.调碗汁：酱油、醋、糖、淀粉、水混合；3.花生米炒熟备用；4.干辣椒和花椒小火炒香；5.下鸡丁滑炒变色；6.加姜蒜葱炒香，倒入碗汁翻炒；7.加花生米翻匀出锅。

- query: "紫菜蛋花汤怎么做"
  intent: howto
  target_dish: "紫菜蛋花汤"
  ground_truth: |
    紫菜蛋花汤的主要原料：紫菜、鸡蛋、虾皮、葱、盐、香油。
    步骤：1.紫菜撕小片，鸡蛋打散；2.锅中加水烧开，加虾皮；3.放入紫菜煮1分钟；4.转小火淋入蛋液形成蛋花；5.加盐调味，点香油撒葱花。

- query: "可乐鸡翅的做法"
  intent: howto
  target_dish: "可乐鸡翅"
  ground_truth: |
    可乐鸡翅的主要原料：鸡翅、可乐、姜、料酒、生抽、老抽、盐。
    步骤：1.鸡翅洗净划两刀，焯水沥干；2.热油煎鸡翅至两面金黄；3.加姜片、料酒、生抽、老抽翻炒；4.倒入可乐没过鸡翅；5.大火烧开转小火炖15-20分钟；6.大火收汁即可。

- query: "水煮鱼怎么做"
  intent: howto
  target_dish: "水煮鱼"
  ground_truth: |
    水煮鱼的主要原料：草鱼片、豆芽、干辣椒、花椒、豆瓣酱、姜、蒜、蛋清、淀粉、盐。
    步骤：1.鱼片加蛋清、淀粉、盐腌制；2.豆芽焯水铺碗底；3.炒豆瓣酱和姜蒜出红油；4.加水煮开，下鱼片滑散；5.鱼片变白捞出放豆芽上；6.撒干辣椒和花椒，浇热油。

- query: "饺子怎么包"
  intent: howto
  target_dish: "饺子"
  ground_truth: |
    饺子的主要原料：面粉、水、猪肉、白菜、葱、姜、盐、生抽、香油。
    步骤：1.面粉加水和成面团醒发30分钟；2.猪肉剁碎，白菜切碎挤水，加调料拌馅；3.面团揉光滑，分剂子擀皮；4.面皮放馅对折捏紧封口；5.水开下饺子，煮至浮起加两次凉水即可。

- query: "蒜蓉西兰花的做法"
  intent: howto
  target_dish: "蒜蓉西兰花"
  ground_truth: |
    蒜蓉西兰花的主要原料：西兰花、蒜、盐、油。
    步骤：1.西兰花掰成小朵，焯水1分钟捞出；2.蒜切末；3.热锅热油炒香蒜末；4.下西兰花翻炒，加盐调味出锅。

