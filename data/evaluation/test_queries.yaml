- query: "老抽和生抽有什么区别"
  intent: factual
  ground_truth: "生抽颜色较浅、味道咸鲜，主要用于调味和提鲜；老抽颜色深浓、有焦糖色，主要用于上色和增香。"

- query: "做红烧肉用什么部位的肉"
  intent: factual
  ground_truth: "做红烧肉一般使用猪五花肉，肥瘦相间，做出的红烧肉口感软糯不柴。"

- query: "豆瓣酱是什么"
  intent: factual
  ground_truth: "豆瓣酱是以蚕豆为主要原料发酵制成的调味品，是川菜的灵魂调料，以郫县豆瓣最为著名，色泽红亮、酱香浓郁、辣味适中。"

- query: "鱼香肉丝里为什么没有鱼"
  intent: factual
  ground_truth: "鱼香肉丝中的'鱼香'指的是一种味型而非食材。鱼香味型来源于泡辣椒、姜、蒜、葱、糖、醋、酱油等调料复合而成的味道，是川菜中经典的复合味型之一，因此菜里并没有鱼。"

- query: "高蛋白低脂肪的菜有哪些"
  intent: factual
