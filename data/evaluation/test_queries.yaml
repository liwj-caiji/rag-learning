- query: "麻婆豆腐怎么做"
  intent: howto
  target_dish: "麻婆豆腐"
  ground_truth: |
    麻婆豆腐的主要原料：内脂豆腐、咸鸭蛋、五花肉（或肉糜）、大蒜、生姜、小米椒、香辣酱（蒜蓉辣酱）、花椒、食盐、味极鲜酱油。
    步骤：1.大蒜生姜切碎，小米辣切圈备用；2.五花肉剁成肉糜，加一半食盐和味极鲜酱油腌制；3.咸鸭蛋去除蛋黄，蛋白捣碎备用；4.豆腐在盒内划成小块备用；5.热锅加油，小火放入大蒜、生姜、辣椒圈、花椒、咸鸭蛋、蒜蓉辣酱翻炒20秒出香味；6.转中火放入肉糜翻炒约1分钟至变色；7.转小火放入豆腐，撒剩余食盐和酱油；8.从锅边倒入开水没过豆腐；9.大火烧开后转中火煮约10分钟；10.待汤汁剩约1/5且豆腐上色后关火盛盘。

- query: "红烧肉的做法"
  intent: howto
  target_dish: "红烧肉"
  ground_truth: |
    红烧肉的主要原料：五花肉、冰糖、白砂糖、食用油、老抽、料酒、香叶、八角、生姜、盐、葱、蒜、花椒。
    步骤：1.五花肉切成大块冷水下锅焯水，加姜片和料酒，煮5分钟后捞出切小块；2.炒糖色：锅中放油和冰糖，小火炒至焦糖色冒泡；3.下肉块翻炒均匀上色；4.加入老抽、料酒、香叶、八角、葱段、姜片、蒜、花椒炒香；5.倒入开水没过肉块，加冰糖和白砂糖调味；6.大火烧开转小火炖约1小时至肉酥烂；7.加盐调味，大火收汁至汤汁浓稠即可。

