- query: "蒜蓉西兰花的做法"
  intent: howto
  target_dish: "蒜蓉西兰花"
  ground_truth: |
    蒜蓉西兰花的主要原料：西兰花、大蒜、生抽、蚝油、白糖、食用油。
    步骤：1.西兰花切成小朵清洗干净；2.大蒜去皮切成蒜末备用；3.锅中加水大火烧开，放入西兰花大火煮2-3分钟至颜色翠绿变软；4.捞出沥干水分摆入盘中；5.热锅加油，放入蒜末小火煸炒出香味；6.加入生抽、蚝油、白糖和少许饮用水；7.将汤汁烧开后均匀淋在盘中的西兰花上即可。

