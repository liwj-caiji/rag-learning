- query: "清蒸鲈鱼怎么做好吃"
  intent: howto
  target_dish: "清蒸鲈鱼"
  ground_truth: |
    清蒸鲈鱼的主要原料：鲈鱼、香葱、姜、食用油、蒸鱼豉油、料酒、食用盐。
    步骤：1.姜切片切丝，香葱葱白切段、葱绿切丝后冷水浸泡备用；2.鲈鱼处理干净擦干，两面划刀，用盐洗掉粘液，抹10g盐腌制10分钟以上；3.改刀使鱼能立起来蒸；4.鱼肚塞姜和葱白，鱼身撒姜和葱白；5.蒸鱼碟用筷子隔开，水热后放入鱼；6.大火蒸8-10分钟；7.蒸好后换干净盘子，去除鱼身姜葱；8.鱼身浇蒸鱼豉油；9.撒新鲜姜丝和葱丝，淋上烧热的食用油即可。

- query: "宫保鸡丁的做法"
  intent: howto
  target_dish: "宫保鸡丁"
  ground_truth: |
    宫保鸡丁的主要原料：手枪腿（或鸡胸脯肉）、大葱、干辣椒（或二荆条）、熟花生、生抽酱油、香醋、白糖、料酒、盐、鸡精、淀粉、植物油、芝麻油。
    步骤：1.手枪腿去骨，鸡肉用刀背拍打后切1.5cm见方肉丁，泡清水10分钟后控干；2.葱绿与姜片加开水制成葱姜水，葱白切圆粒，花生微波炉焙干；3.鸡丁加盐、老抽、料酒、淀粉搅拌，加葱姜水搅拌至粘手，密封冰箱腌制1小时；4.干辣椒切段，小火焙干至微糊；花椒焙干出香；5.大火热油七成热下鸡丁，煎至发白翻面翻炒均匀；6.下葱粒翻炒，加葱姜水和热水，盖锅盖中小火焖2分钟；7.下熟花生、干辣椒、花椒，加鸡精、香醋、白糖翻炒；8.水淀粉勾芡收汁，关火淋芝麻油出锅。

- query: "紫菜蛋花汤怎么做"
  intent: howto
  target_dish: "紫菜蛋花汤"
  ground_truth: |
    紫菜蛋花汤的主要原料：紫菜、鸡蛋、葱花、盐、油、虾仁/虾皮（可选）、香油。
    步骤：1.干紫菜用清水泡15分钟，捞起沥干水分备用；2.锅中加入清水、油和盐，大火烧开；3.水开后放入紫菜，煮3分钟；4.将打好的蛋液徐徐倒入锅中，约30秒后关火；5.撒上葱花，转小火20秒；6.出锅前滴入几滴香油（可加一点虾皮提鲜）即可。

- query: "可乐鸡翅的做法"
  intent: howto
  target_dish: "可乐鸡翅"
  ground_truth: |
    可乐鸡翅的主要原料：鸡翅中、可乐、白糖、生抽、老抽（可选）、盐、生姜、料酒（或啤酒）、小葱。
    步骤：1.鸡翅冷水入锅淹没，加生姜和料酒，大火煮开后撇去浮沫，沥干水分；2.鸡翅两面各划两刀，用生抽腌制10分钟；3.小火起油，放入姜片爆香，下鸡翅煎至两面金黄；4.倒入可乐没过鸡翅，大火煮沸撇去浮沫，加入葱结；5.加盐、白糖、生抽、老抽调味；6.葱结变黄后与姜片一起捞出，转中火继续慢煮；7.待可乐呈现挂丝状态，关小火收汁挂在鸡翅上，出锅装盘。

- query: "水煮鱼怎么做"
  intent: howto
  target_dish: "水煮鱼"
  ground_truth: |
    水煮鱼的主要原料：巴沙鱼、蔬菜（土豆片/豆芽/花菜/生菜等）、红油豆瓣酱、藤椒油、菜籽油、白胡椒粉、蒜瓣、盐、糖。
    步骤：1.巴沙鱼解冻后切成约5cm长、3cm宽的薄片；2.鱼片加豆瓣酱、盐、藤椒油、白胡椒粉抓匀，加少许菜籽油封住，腌制至少30分钟；3.大蒜切末，蔬菜洗净，花菜焯水、生菜炒熟备用；4.热锅冷油加入豆瓣酱和蒜末中火慢炒出香；5.加入热水煮开，下入鱼片轻轻翻动，加盐和糖调味；6.水再次沸腾后先将熟蔬菜盛入大碗，再盛入鱼片，浇上热汤即可。

